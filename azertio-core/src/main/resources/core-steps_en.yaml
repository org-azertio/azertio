'assert.variable.integer':
  expression: 'the integer variable {variable:id} {{integer-assertion}}'
  assertion-hints:
    - 'is equal to 0'
    - 'is not equal to 0'
    - 'is greater than 0'
    - 'is less than 100'
  example: |
    Then the integer variable count is equal to 5
  scenarios:
    - title: Assert an exact integer value
      gherkin: |
        When I make a GET request to "orders/42"
        Then the integer variable retries is equal to 3



'assert.variable.decimal':
  expression: 'the decimal variable {variable:id} {{decimal-assertion}}'
  assertion-hints:
    - 'is equal to 0.0'
    - 'is not equal to 0.0'
    - 'is greater than 0.0'
    - 'is less than 1.0'
  example: |
    Then the decimal variable price is equal to 19.99
  scenarios:
    - title: Assert an exact decimal value
      gherkin: |
        When I make a GET request to "products/1"
        Then the decimal variable price is equal to 19.99
    - title: Assert a decimal is positive
      gherkin: |
        When I make a POST request to "cart/apply-coupon" with body:
        """json
        {"code": "SAVE10"}
        """
        Then the decimal variable discount is greater than 0.0


'assert.variable.date':
  expression: 'the date variable {variable:id} {{date-assertion}}'
  assertion-hints:
    - 'is equal to 2025-01-01'
    - 'is before 2025-12-31'
    - 'is after 2020-01-01'
  example: |
    Then the date variable expiryDate is after 2025-01-01
  scenarios:
    - title: Assert a date is in the future
      gherkin: |
        When I make a GET request to "subscriptions/me"
        Then the date variable expiryDate is after 2025-01-01
    - title: Assert an exact date
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "Alice", "birthdate": "1990-06-15"}
        """
        Then the date variable createdAt is equal to 2024-06-15


'assert.variable.time':
  expression: 'the time variable {variable:id} {{time-assertion}}'
  assertion-hints:
    - 'is equal to 12:00:00'
    - 'is before 18:00:00'
    - 'is after 08:00:00'
  example: |
    Then the time variable openTime is before 18:00:00
  scenarios:
    - title: Assert a time is before a given time
      gherkin: |
        When I make a GET request to "stores/1/schedule"
        Then the time variable openTime is before 18:00:00
    - title: Assert an exact time
      gherkin: |
        When I make a POST request to "appointments" with body:
        """json
        {"slot": "09:30:00"}
        """
        Then the time variable scheduledAt is equal to 09:30:00


'assert.variable.datetime':
  expression: 'the datetime variable {variable:id} {{datetime-assertion}}'
  assertion-hints:
    - 'is equal to 2025-01-01T00:00:00'
    - 'is before 2025-12-31T23:59:59'
    - 'is after 2020-01-01T00:00:00'
  example: |
    Then the datetime variable createdAt is before 2025-12-31T23:59:59
  scenarios:
    - title: Assert a datetime is before a given instant
      gherkin: |
        When I make a POST request to "events" with body:
        """json
        {"name": "Conference", "start": "2025-06-01T09:00:00"}
        """
        Then the datetime variable createdAt is before 2025-12-31T23:59:59
    - title: Assert an exact datetime
      gherkin: |
        When I make a GET request to "audit/latest"
        Then the datetime variable timestamp is equal to 2024-06-15T10:30:00


'assert.variable.text':
  expression: 'the text variable {variable:id} {{text-assertion}}'
  assertion-hints:
    - 'is equal to "expected"'
    - 'is not equal to "unexpected"'
    - 'contains "partial"'
    - 'starts with "prefix"'
    - 'ends with "suffix"'
  example: |
    Then the text variable status is equal to "active"
  scenarios:
    - title: Assert an exact string value
      gherkin: |
        When I make a GET request to "users/1"
        Then the text variable status is equal to "active"
    - title: Assert a string contains a substring
      gherkin: |
        When I make a POST request to "notifications/send" with body:
        """json
        {"recipient": "alice@example.com", "template": "welcome"}
        """
        Then the text variable message contains "success"


'enable.benchmark.mode':
  expression: 'benchmark mode is enabled with {executions:integer} executions and {threads:integer} threads'
  example: |
    Given benchmark mode is enabled with 100 executions and 4 threads
  scenarios:
    - title: Enable benchmark mode before a step
      gherkin: |
        Given benchmark mode is enabled with 200 executions and 8 threads
        When I make a GET request to "health"
        Then the benchmark mean response time is less than 100


