name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build CLI distribution
        run: ./mvnw -B package -pl azertio-cli -am -DskipTests

      - name: Verify ZIP exists
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ZIP="azertio-cli/target/azertio-cli-${VERSION}-dist.zip"
          if [ ! -f "$ZIP" ]; then
            echo "ERROR: $ZIP not found after build"
            exit 1
          fi
          echo "ZIP_PATH=$ZIP" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Delete existing release if present
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A prior immutable release (e.g. created by central-publishing-maven-plugin
          # or manually) must be removed before we can publish one with the ZIP.
          if gh release view "$GITHUB_REF_NAME" 2>/dev/null; then
            gh release delete "$GITHUB_REF_NAME" --yes
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Azertio ${GITHUB_REF_NAME}" \
            --generate-notes \
            "${ZIP_PATH}#azertio-cli-${VERSION}-dist.zip"