name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and install all modules
        run: ./mvnw -B install -DskipTests -Pplugins

      - name: Test all modules
        run: ./mvnw -B verify -Pplugins

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/jacoco.xml'
          retention-days: 1

  sonar:
    needs: build
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build without tests
        run: ./mvnw -B install -DskipTests -Pplugins

      - name: Download JaCoCo reports
        uses: actions/download-artifact@v4
        with:
          name: jacoco-reports

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B sonar:sonar -Pplugins -DskipTests -Dsonar.projectKey=org-azertio_azertio -Dsonar.organization=org-azertio -Dsonar.host.url=https://sonarcloud.io