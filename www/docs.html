<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azertio Docs</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baumans&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07070f;
      --surface: #0e0e1a;
      --border:  #1e1e35;
      --cyan:    #00ffe0;
      --text:    #d1d5db;
      --muted:   #6b7280;
      --white:   #f9fafb;
      --font:    'Inter', sans-serif;
      --mono:    'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2rem;
      background: rgba(7,7,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo img { width: 100px; height: auto; display: block; }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--white); text-decoration: none; }

    /* ── Layout ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 3.5rem 2rem 6rem;
    }

    /* ── Loading / error states ── */
    #status {
      text-align: center;
      padding: 6rem 0;
      color: var(--muted);
      font-size: 1rem;
    }

    /* ── Markdown content ── */
    .md-body h1 {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .md-body h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      margin: 2.5rem 0 0.8rem;
      letter-spacing: -0.01em;
    }

    .md-body h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--white);
      margin: 1.8rem 0 0.6rem;
    }

    .md-body p {
      margin-bottom: 1rem;
      line-height: 1.75;
    }

    .md-body ul, .md-body ol {
      margin: 0.5rem 0 1rem 1.5rem;
    }
    .md-body li { margin-bottom: 0.35rem; line-height: 1.7; }

    .md-body strong { color: var(--white); font-weight: 600; }

    .md-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .md-body blockquote {
      border-left: 3px solid var(--cyan);
      padding: 0.6rem 1.2rem;
      background: rgba(0,255,224,0.04);
      border-radius: 0 6px 6px 0;
      margin: 1rem 0;
      color: var(--text);
    }

    .md-body code {
      font-family: var(--mono);
      font-size: 0.83em;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: var(--cyan);
    }

    .md-body pre {
      margin: 1.2rem 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow-x: auto;
    }
    .md-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: 0.82rem;
      line-height: 1.7;
    }

    .md-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }
    .md-body th {
      background: var(--surface);
      color: var(--white);
      font-weight: 600;
      padding: 0.65rem 1rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .md-body td {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      vertical-align: top;
    }
    .md-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    .md-body a { color: var(--cyan); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo" aria-label="Azertio home">
    <img src="logo.svg" alt="Azertio" />
  </a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to home
  </a>
</nav>

<div class="page">
  <div id="status">Loading…</div>
  <div id="content" class="md-body" style="display:none"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });

  const params = new URLSearchParams(location.search);
  const doc = params.get('doc');

  if (!doc) {
    document.getElementById('status').textContent = 'No document specified.';
  } else {
    fetch('docs/' + encodeURIComponent(doc) + '.md')
      .then(r => {
        if (!r.ok) throw new Error('Not found');
        return r.text();
      })
      .then(md => {
        const el = document.getElementById('content');
        el.innerHTML = marked.parse(md);
        el.style.display = 'block';
        document.getElementById('status').style.display = 'none';
        const h1 = el.querySelector('h1');
        if (h1) document.title = h1.textContent + ' — Azertio';
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Document not found.';
      });
  }
</script>
</body>
</html>
