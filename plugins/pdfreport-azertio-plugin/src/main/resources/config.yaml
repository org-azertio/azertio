pdfreport.enabled:
  description: |
    Whether to enable PDF report generation. When false, no PDF report will be generated.
  type: boolean
  defaultValue: true

pdfreport.outputDir:
  description: |
    Directory where generated PDF reports will be written.
    Relative paths are resolved from the working directory.
  type: text
  defaultValue: .azertio/reports

pdfreport.title:
  description: |
    Title displayed in the header of the generated PDF report.
    Defaults to the project name if not set.
  type: text

pdfreport.accentColor:
  description: |
    Primary accent color used for report headers, expressed as a hex color (#RRGGBB).
    Suite header backgrounds, feature accent bars, tag labels and the cover-page band are
    all derived automatically from this single value. Defaults to dark navy blue.
  type: text

pdfreport.logoPath:
  description: |
    Path to an image file (PNG or JPEG) to embed as a logo in the report header.
    If not set, no logo is displayed.
  type: text

pdfreport.outputFile:
  description: |
    Name pattern for the generated PDF file, relative to outputDir.
    Supports date tokens: %Y (year), %m (month), %d (day), %h (hour), %M (minute), %s (second).
  type: text
  defaultValue: "%Y%m%d-%h%M%s.pdf"

pdfreport.pageBreak:
  description: |
    Controls where automatic page breaks are inserted.
    Accepted values: none, suite, feature, test_case.
    - none: no extra page breaks (content flows continuously)
    - suite: start each test suite on a new page
    - feature: start each feature on a new page
    - test_case: start each test case on a new page
  type: text
  defaultValue: none

pdfreport.footer:
  description: |
    Fixed text rendered at the bottom-left of every page.
    The page number is always shown at the bottom-right.
    If not set, only the page number is displayed.
  type: text

pdfreport.includePassedSteps:
  description: |
    Whether to include the detail of passed steps in the report.
    When false, only failed and errored steps are shown, producing a more concise report.
  type: boolean
  defaultValue: true