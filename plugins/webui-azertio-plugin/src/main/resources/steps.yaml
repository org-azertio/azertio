'webui.go':
  since: '1.0.0'
  role: when
  description: |
    Navigates the browser to the specified URL.
    If the URL is relative, it is resolved against the configured webui.baseURL.
  parameters:
    - name: url
      type: text
      description: The URL to navigate to


'webui.click':
  since: '1.0.0'
  role: when
  description: |
    Clicks the element identified by the given Playwright locator.
  parameters:
    - name: locator
      type: text
      description: A Playwright locator expression (e.g. CSS selector, role, text)


'webui.fill':
  since: '1.0.0'
  role: when
  description: |
    Clears the input field identified by the locator and types the given value into it.
  parameters:
    - name: locator
      type: text
      description: A Playwright locator expression targeting the input field
    - name: value
      type: text
      description: The text to type into the field


'webui.select':
  since: '1.0.0'
  role: when
  description: |
    Selects the option matching the given value in the dropdown identified by the locator.
    The value is matched against the option label, value attribute, or index.
  parameters:
    - name: value
      type: text
      description: The option to select (label, value attribute, or index)
    - name: locator
      type: text
      description: A Playwright locator expression targeting the select element


'webui.check':
  since: '1.0.0'
  role: when
  description: |
    Checks the checkbox or radio button identified by the locator.
  parameters:
    - name: locator
      type: text
      description: A Playwright locator expression targeting the checkbox or radio button


'webui.uncheck':
  since: '1.0.0'
  role: when
  description: |
    Unchecks the checkbox identified by the locator.
  parameters:
    - name: locator
      type: text
      description: A Playwright locator expression targeting the checkbox


'webui.wait.visible':
  since: '1.0.0'
  role: when
  description: |
    Waits until the element identified by the locator becomes visible.
    Blocks until the element is present in the DOM and visible, or until the
    configured timeout is reached, in which case the step fails.
  parameters:
    - name: locator
      type: text
      description: A Playwright locator expression


'webui.wait.hidden':
  since: '1.0.0'
  role: when
  description: |
    Waits until the element identified by the locator becomes hidden or is removed from the DOM.
    Blocks until the condition is met, or until the configured timeout is reached,
    in which case the step fails.
  parameters:
    - name: locator
      type: text
      description: A Playwright locator expression


'webui.assert.visible':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the element identified by the locator is present in the DOM and visible.
  parameters:
    - name: locator
      type: text
      description: A Playwright locator expression


'webui.assert.hidden':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the element identified by the locator is absent or not visible.
  parameters:
    - name: locator
      type: text
      description: A Playwright locator expression


'webui.assert.text':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the inner text of the element identified by the locator satisfies the given condition.
  parameters:
    - name: locator
      type: text
      description: A Playwright locator expression


'webui.assert.url':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the current page URL satisfies the given condition.


'webui.assert.title':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the current page title satisfies the given condition.


'webui.extract.text':
  since: '1.0.0'
  role: then
  description: |
    Stores the inner text of the element identified by the locator into a scenario variable
    for later use in the test.
  parameters:
    - name: variable
      type: id
      description: The name of the variable where the text will be stored
    - name: locator
      type: text
      description: A Playwright locator expression