htmlreport.outputDir:
  description: |
    Directory where generated HTML reports will be written.
    Relative paths are resolved from the working directory.
  type: text
  defaultValue: .azertio/reports

htmlreport.title:
  description: |
    Title displayed in the header of the generated HTML report.
    Defaults to the project name if not set.
  type: text

htmlreport.accentColor:
  description: |
    Primary accent color used for report headers, expressed as a hex color (#RRGGBB).
    Suite header backgrounds, feature accent bars, tag labels, and the cover band are
    all derived automatically from this single value. Defaults to dark navy blue.
  type: text

htmlreport.logoPath:
  description: |
    Path to an image file (PNG or JPEG) to embed as a logo in the report header.
    The image is embedded as base64 so the HTML file remains self-contained.
    If not set, no logo is displayed.
  type: text

htmlreport.outputFile:
  description: |
    Name pattern for the generated HTML file, relative to outputDir.
    Supports date tokens: %Y (year), %m (month), %d (day), %h (hour), %M (minute), %s (second).
  type: text
  defaultValue: "%Y%m%d-%h%M%s.html"

htmlreport.footer:
  description: |
    Fixed text rendered at the bottom-left of the report footer.
    If not set, only the "Generated by Azertio" credit is displayed.
  type: text

htmlreport.includePassedSteps:
  description: |
    Whether to include the detail of passed steps in the report.
    When false, only failed and errored steps are shown, producing a more concise report.
  type: boolean
  defaultValue: true