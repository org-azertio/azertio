'rest.auth.headers':
  expression: 'the following headers are set for all subsequent requests:'
  example: |
    Given the following headers are set for all subsequent requests:
      | X-Tenant-Id | acme |
      | X-Version   | 2    |
  scenarios:
    - title: Set custom headers for all requests in the scenario
      gherkin: |
        Given the following headers are set for all subsequent requests:
          | X-Tenant-Id | acme |
          | X-Version   | 2    |
        When I make a GET request to "users"
        Then the HTTP status code is equal to 200
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200


'rest.auth.bearer':
  expression: 'the authorization is Bearer {token:text}'
  example: |
    Given the authorization is Bearer mytoken
  scenarios:
    - title: Authenticate with a static Bearer token
      gherkin: |
        Given the authorization is Bearer mytoken
        When I make a GET request to "secure/resource"
        Then the HTTP status code is equal to 200
    - title: Authenticate with a token stored in a variable
      gherkin: |
        Given the authorization is Bearer "${accessToken}"
        When I make a GET request to "secure/resource"
        Then the HTTP status code is equal to 200


'rest.auth.basic':
  expression: 'the authorization is Basic with username {username:text} and password {password:text}'
  example: |
    Given the authorization is Basic with username "admin" and password "secret"
  scenarios:
    - title: Authenticate with Basic credentials
      gherkin: |
        Given the authorization is Basic with username "admin" and password "secret"
        When I make a GET request to "admin/settings"
        Then the HTTP status code is equal to 200
    - title: Authenticate using credentials from configuration variables
      gherkin: |
        Given the authorization is Basic with username "${api.user}" and password "${api.password}"
        When I make a POST request to "data" with body:
        """json
        {"key": "value"}
        """
        Then the HTTP status code is equal to 201


'rest.auth.apikey.header':
  expression: 'the API key {key:text} is sent in header {name:text}'
  example: |
    Given the API key "abc123" is sent in header "X-API-Key"
  scenarios:
    - title: Authenticate with an API key in a custom header
      gherkin: |
        Given the API key "abc123" is sent in header "X-API-Key"
        When I make a GET request to "data"
        Then the HTTP status code is equal to 200
    - title: Authenticate using an API key from a configuration variable
      gherkin: |
        Given the API key "${api.key}" is sent in header "X-API-Key"
        When I make a GET request to "data"
        Then the HTTP status code is equal to 200


'rest.auth.apikey.query':
  expression: 'the API key {key:text} is sent as query parameter {name:text}'
  example: |
    Given the API key "abc123" is sent as query parameter "api_key"
  scenarios:
    - title: Authenticate with an API key as a query parameter
      gherkin: |
        Given the API key "abc123" is sent as query parameter "api_key"
        When I make a GET request to "data"
        Then the HTTP status code is equal to 200
    - title: Authenticate using an API key from a configuration variable
      gherkin: |
        Given the API key "${api.key}" is sent as query parameter "api_key"
        When I make a GET request to "data"
        Then the HTTP status code is equal to 200


'rest.auth.oauth2.client_credentials':
  expression: 'I obtain an OAuth2 client credentials token from {url:text} with client {clientId:text} and secret {clientSecret:text} into variable {variable:id}'
  example: |
    Given I obtain an OAuth2 client credentials token from "https://auth.example.com/token" with client "my-client" and secret "my-secret" into variable accessToken
  scenarios:
    - title: Obtain an OAuth2 token and use it to access a protected resource
      gherkin: |
        Given I obtain an OAuth2 client credentials token from "${auth.tokenUrl}" with client "${auth.clientId}" and secret "${auth.clientSecret}" into variable accessToken
        And the authorization is Bearer "${accessToken}"
        When I make a GET request to "secure/resource"
        Then the HTTP status code is equal to 200
    - title: Obtain a token and verify the protected resource response body
      gherkin: |
        Given I obtain an OAuth2 client credentials token from "${auth.tokenUrl}" with client "${auth.clientId}" and secret "${auth.clientSecret}" into variable accessToken
        And the authorization is Bearer "${accessToken}"
        When I make a POST request to "orders" with body:
        """json
        {"product": "widget", "qty": 5}
        """
        Then the HTTP status code is equal to 201


'rest.request.headers':
  expression: 'the next request has the headers:'
  example: |
    Given the next request has the headers:
      | Authorization | Bearer mytoken |
      | X-Tenant-Id   | acme           |
  scenarios:
    - title: Send an authorization header with a GET request
      gherkin: |
        Given the next request has the headers:
          | Authorization | Bearer ${token} |
        When I make a GET request to "secure/resource"
        Then the HTTP status code is equal to 200


'rest.request.GET':
  expression: 'I make a GET request to {endpoint:text}'
  example: |
    When I make a GET request to "users"
  scenarios:
    - title: Retrieve a collection of resources
      gherkin: |
        When I make a GET request to "users"
        Then the HTTP status code is equal to 200
        And the response body contains:
        """json
        [{"id": 1, "name": "Alice"}]
        """
    - title: Retrieve a single resource by ID
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
    - title: Request a non-existent resource
      gherkin: |
        When I make a GET request to "users/9999"
        Then the HTTP status code is equal to 404


'rest.request.POST.empty':
  expression: 'I make a POST request to {endpoint:text}'
  example: |
    When I make a POST request to "users"
  scenarios:
    - title: Trigger an action with no payload
      gherkin: |
        When I make a POST request to "sessions/logout"
        Then the HTTP status code is equal to 204


'rest.request.POST.body':
  expression: 'I make a POST request to {endpoint:text} with body:'
  example: |
    When I make a POST request to "users" with body:
    """json
    {
      "name": "John",
      "age": 30
    }
    """
  scenarios:
    - title: Create a new resource successfully
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "John", "age": 30}
        """
        Then the HTTP status code is equal to 201
        And the response body contains:
        """json
        {"name": "John"}
        """
    - title: Reject a request with invalid data
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": ""}
        """
        Then the HTTP status code is equal to 400


'rest.request.POST.file':
  expression: 'I make a POST request to {endpoint:text} with body from file {file:text}'
  example: |
    When I make a POST request to "users" with body from file "user_data.json"
  scenarios:
    - title: Create a resource using a body from file
      gherkin: |
        When I make a POST request to "users" with body from file "fixtures/new_user.json"
        Then the HTTP status code is equal to 201


'rest.request.PUT.body':
  expression: 'I make a PUT request to {endpoint:text} with body:'
  example: |
    When I make a PUT request to "users/123" with body:
    """json
    {
      "name": "John",
      "age": 31
    }
    """
  scenarios:
    - title: Replace a resource completely
      gherkin: |
        When I make a PUT request to "users/1" with body:
        """json
        {"name": "John Updated", "age": 31}
        """
        Then the HTTP status code is equal to 200
        And the response body contains:
        """json
        {"name": "John Updated"}
        """
    - title: Replace a non-existent resource
      gherkin: |
        When I make a PUT request to "users/9999" with body:
        """json
        {"name": "Ghost"}
        """
        Then the HTTP status code is equal to 404


'rest.request.PUT.file':
  expression: 'I make a PUT request to {endpoint:text} with body from file {file:text}'
  example: |
    When I make a PUT request to "users/123" with body from file "updated_user_data.json"
  scenarios:
    - title: Replace a resource using a body from file
      gherkin: |
        When I make a PUT request to "users/1" with body from file "fixtures/updated_user.json"
        Then the HTTP status code is equal to 200


'rest.request.PATCH.body':
  expression: 'I make a PATCH request to {endpoint:text} with body:'
  example: |
    When I make a PATCH request to "users/123" with body:
    """json
    {
      "age": 32
    }
    """
  scenarios:
    - title: Partially update a resource
      gherkin: |
        When I make a PATCH request to "users/1" with body:
        """json
        {"age": 32}
        """
        Then the HTTP status code is equal to 200
        And the response body contains:
        """json
        {"id": 1, "age": 32}
        """


'rest.request.PATCH.file':
  expression: 'I make a PATCH request to {endpoint:text} with body from file {file:text}'
  example: |
    When I make a PATCH request to "users/123" with body from file "partial_user_update.json"
  scenarios:
    - title: Partially update a resource using a body from file
      gherkin: |
        When I make a PATCH request to "users/1" with body from file "fixtures/partial_update.json"
        Then the HTTP status code is equal to 200


'rest.request.DELETE':
  expression: 'I make a DELETE request to {endpoint:text}'
  example: |
    When I make a DELETE request to "users/123"
  scenarios:
    - title: Delete an existing resource
      gherkin: |
        When I make a DELETE request to "users/1"
        Then the HTTP status code is equal to 204
    - title: Delete a non-existent resource
      gherkin: |
        When I make a DELETE request to "users/9999"
        Then the HTTP status code is equal to 404


'rest.response.statusCode':
  expression: 'the HTTP status code {{integer-assertion}}'
  assertion-hints:
    - 'is equal to 200'
    - 'is equal to 201'
    - 'is equal to 204'
    - 'is equal to 400'
    - 'is equal to 401'
    - 'is equal to 403'
    - 'is equal to 404'
    - 'is not equal to 500'
    - 'is greater than 199'
    - 'is less than 300'
    - 'is between 200 and 299'
  example: |
    Then the HTTP status code is equal to 200
  scenarios:
    - title: Verify a successful GET response
      gherkin: |
        When I make a GET request to "users"
        Then the HTTP status code is equal to 200
    - title: Verify a resource was created
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "Alice"}
        """
        Then the HTTP status code is equal to 201
    - title: Verify a successful deletion
      gherkin: |
        When I make a DELETE request to "users/1"
        Then the HTTP status code is equal to 204
    - title: Verify an error response
      gherkin: |
        When I make a GET request to "users/9999"
        Then the HTTP status code is equal to 404


'rest.response.body':
  expression: 'the response body is:'
  example: |
    Then the response body is:
    """json
    {
      "id": 123,
      "name": "John",
      "age": 30
    }
    """
  scenarios:
    - title: Verify exact response body after a GET
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
        And the response body is:
        """json
        {"id": 1, "name": "Alice", "age": 25}
        """
    - title: Verify exact response body after a POST
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "Bob", "age": 22}
        """
        Then the HTTP status code is equal to 201
        And the response body is:
        """json
        {"id": 2, "name": "Bob", "age": 22}
        """


'rest.response.body.file':
  expression: 'the response body is the content of file {file:text}'
  example: |
    Then the response body is the content of file "expected_response.json"
  scenarios:
    - title: Verify response body matches a reference file
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
        And the response body is the content of file "fixtures/expected_user.json"


'rest.response.body.contains':
  expression: 'the response body contains:'
  example: |
    Then the response body contains:
    """json
    {
      "id": 123,
      "name": "John"
    }
    """
  scenarios:
    - title: Verify a field is present in the response after a GET
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
        And the response body contains:
        """json
        {"name": "Alice"}
        """
    - title: Verify a new resource appears in a collection
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "Carol"}
        """
        Then the HTTP status code is equal to 201
        And the response body contains:
        """json
        {"name": "Carol"}
        """


'rest.response.headers':
  expression: 'the response headers include:'
  example: |
    Then the response headers include:
      | Content-Type    | application/json |
      | X-Custom-Header | my-value         |
  scenarios:
    - title: Verify expected headers are present in the response
      gherkin: |
        When I make a GET request to "users"
        Then the HTTP status code is equal to 200
        And the response headers include:
          | Content-Type | application/json |


'rest.response.extracts.header':
  expression: 'I store the value of response header {header:text} into variable {variable:id}'
  example: |
    Then I store the value of response header "X-Request-Id" into variable requestId
  scenarios:
    - title: Store a response header and use it in a subsequent request
      gherkin: |
        When I make a POST request to "orders" with body:
        """json
        {"product": "widget"}
        """
        Then I store the value of response header "X-Order-Id" into variable orderId
        When I make a GET request to "orders/${orderId}"
        Then the HTTP status code is equal to 200
    - title: Store a correlation ID returned by the server
      gherkin: |
        When I make a GET request to "users"
        Then I store the value of response header "X-Correlation-Id" into variable correlationId
        And the HTTP status code is equal to 200


'rest.response.extracts.field':
  expression: 'I store the value of field {field:text} from the response body into variable {variable:id}'
  example: |
    Then I store the value of field "id" from the response body into variable userId
  scenarios:
    - title: Store a field and use it in a subsequent request
      gherkin: |
        When I make a POST request to "users" with body:
        """json
        {"name": "Carol"}
        """
        Then I store the value of field "id" from the response body into variable newUserId
        And I make a GET request to "users/${newUserId}"
        Then the HTTP status code is equal to 200
    - title: Use a stored variable in a subsequent request
      gherkin: |
        When I make a GET request to "users/1"
        Then the HTTP status code is equal to 200
        And I store the value of field "id" from the response body into variable existingUserId
        And I make a GET request to "users/${existingUserId}"
        Then the HTTP status code is equal to 200