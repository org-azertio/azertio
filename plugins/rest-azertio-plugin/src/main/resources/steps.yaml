'rest.auth.headers':
  since: '1.0.0'
  role: given
  description: |
    Sets headers that will be sent with every subsequent HTTP request in the scenario.
  additional-data: |
    A two-column table where each row specifies a header name and its value.


'rest.auth.bearer':
  since: '1.0.0'
  role: given
  description: |
    Sets a Bearer token as the authorization for every subsequent HTTP request in the scenario.
  parameters:
    - name: token
      type: text
      description: The Bearer token value


'rest.auth.basic':
  since: '1.0.0'
  role: given
  description: |
    Sets HTTP Basic authentication credentials for every subsequent HTTP request in the scenario.
    The credentials are Base64-encoded and sent as an Authorization header.
  parameters:
    - name: username
      type: text
      description: The username
    - name: password
      type: text
      description: The password


'rest.auth.apikey.header':
  since: '1.0.0'
  role: given
  description: |
    Sets an API key that will be sent as a request header with every subsequent HTTP request in the scenario.
  parameters:
    - name: key
      type: text
      description: The API key value
    - name: name
      type: text
      description: The header name to use (e.g. X-API-Key)


'rest.auth.apikey.query':
  since: '1.0.0'
  role: given
  description: |
    Sets an API key that will be appended as a query parameter to every subsequent HTTP request URL in the scenario.
  parameters:
    - name: key
      type: text
      description: The API key value
    - name: name
      type: text
      description: The query parameter name (e.g. api_key)


'rest.auth.oauth2.client_credentials':
  since: '1.0.0'
  role: given
  description: |
    Obtains an OAuth2 access token using the client credentials grant and stores it in a scenario variable.
    Credentials are sent via HTTP Basic Authentication (CLIENT_SECRET_BASIC, RFC 6749 §2.3.1).
    The token can then be used with the rest.auth.bearer step.
  parameters:
    - name: url
      type: text
      description: The token endpoint URL (always used as-is, regardless of rest.baseURL)
    - name: clientId
      type: text
      description: The OAuth2 client ID
    - name: clientSecret
      type: text
      description: The OAuth2 client secret
    - name: variable
      type: id
      description: The variable name where the access token will be stored


'rest.auth.oauth2.password':
  since: '1.1.0'
  role: given
  description: |
    Obtains an OAuth2 access token using the Resource Owner Password Credentials grant (ROPC)
    and stores it in a scenario variable. Useful for testing endpoints secured by user roles.
    Credentials are sent via HTTP Basic Authentication (CLIENT_SECRET_BASIC, RFC 6749 §2.3.1).
    The token can then be used with the rest.auth.bearer step.
  parameters:
    - name: url
      type: text
      description: The token endpoint URL (always used as-is, regardless of rest.baseURL)
    - name: clientId
      type: text
      description: The OAuth2 client ID
    - name: clientSecret
      type: text
      description: The OAuth2 client secret
    - name: username
      type: text
      description: The resource owner username
    - name: password
      type: text
      description: The resource owner password
    - name: variable
      type: id
      description: The variable name where the access token will be stored


'rest.request.headers':
  since: '1.0.0'
  role: given
  description: |
    Sets headers to be sent with the next HTTP request only.
  additional-data: |
    A two-column table where each row specifies a header name and its value.


'rest.request.GET':
  since: '1.0.0'
  role: when
  description: |
    Makes a GET request to the specified URL.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the GET request is made


'rest.request.POST.empty':
  since: '1.0.0'
  role: when
  description: |
    Makes a POST request to the specified URL with an empty body.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the POST request is made


'rest.request.POST.body':
  since: '1.0.0'
  role: when
  description: |
    Makes a POST request to the specified URL with the given body.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the POST request is made
  additional-data: |
    The body of the POST request, provided as a multi-line text input.


'rest.request.POST.urlencoded':
  since: '1.1.0'
  role: when
  description: |
    Makes a POST request to the specified URL with an application/x-www-form-urlencoded body
    built from the given key-value table. Values are URL-encoded automatically.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the POST request is made
  additional-data: |
    A two-column table where each row is a form field name and its value.


'rest.request.POST.multipart':
  since: '1.1.0'
  role: when
  description: |
    Makes a POST request to the specified URL with a multipart/form-data body
    built from the given key-value table. Each row becomes a separate form part.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the POST request is made
  additional-data: |
    A two-column table where each row is a form field name and its value.


'rest.request.POST.file':
  since: '1.0.0'
  role: when
  description: |
    Makes a POST request to the specified URL with the given body read from a file.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the POST request is made
    - name: file
      type: text
      description: The path to the file containing the body of the POST request


'rest.request.PUT.body':
  since: '1.0.0'
  role: when
  description: |
    Makes a PUT request to the specified URL with the given body.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the PUT request is made
  additional-data: |
    The body of the PUT request, provided as a multi-line text input.


'rest.request.PUT.file':
  since: '1.0.0'
  role: when
  description: |
    Makes a PUT request to the specified URL with the given body read from a file.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the PUT request is made
    - name: file
      type: text
      description: The path to the file containing the body of the PUT request


'rest.request.PATCH.body':
  since: '1.0.0'
  role: when
  description: |
    Makes a PATCH request to the specified URL with the given body.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the PATCH request is made
  additional-data: |
    The body of the PATCH request, provided as a multi-line text input.


'rest.request.PATCH.file':
  since: '1.0.0'
  role: when
  description: |
    Makes a PATCH request to the specified URL with the given body read from a file.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the PATCH request is made
    - name: file
      type: text
      description: The path to the file containing the body of the PATCH request


'rest.request.DELETE':
  since: '1.0.0'
  role: when
  description: |
    Makes a DELETE request to the specified URL.
  parameters:
    - name: endpoint
      type: text
      description: The URL to which the DELETE request is made


'rest.response.statusCode':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the status code of the last REST response matches the expected value.


'rest.response.body':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the body of the last REST response matches exactly the expected value.
  additional-data: |
    The expected body of the response, provided as a multi-line text input.


'rest.response.body.file':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the body of the last REST response matches exactly the expected value read from a file.
  parameters:
    - name: file
      type: text
      description: The path to the file containing the expected body of the response


'rest.response.body.contains':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the body of the last REST response contains the expected value.
  additional-data: |
    The expected content that should be present in the response body, provided as a multi-line text input.


'rest.response.headers':
  since: '1.0.0'
  role: then
  description: |
    Asserts that the last REST response includes the specified headers with the given values.
    Additional response headers not listed in the table are accepted.
  additional-data: |
    A two-column table where each row specifies an expected header name and its expected value.


'rest.response.extracts.field':
  since: '1.0.0'
  role: then
  description: |
    Stores the value of a field from the response body into a variable for later use in the test scenario.
  parameters:
    - name: field
      type: text
      description: The path of the field in the response body whose value should be stored
    - name: variable
      type: id
      description: The name of the variable where the value will be stored


'rest.response.extracts.header':
  since: '1.0.0'
  role: then
  description: |
    Stores the value of a response header into a variable for later use in the test scenario.
    Fails if the header is not present in the response.
  parameters:
    - name: header
      type: text
      description: The name of the response header whose value should be stored
    - name: variable
      type: id
      description: The name of the variable where the header value will be stored

