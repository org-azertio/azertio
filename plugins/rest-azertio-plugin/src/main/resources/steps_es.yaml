'rest.auth.headers':
  expression: 'los siguientes headers se aplican a todas las peticiones posteriores:'
  example: |
    Dado que los siguientes headers se aplican a todas las peticiones posteriores:
      | X-Tenant-Id | acme |
      | X-Version   | 2    |
  scenarios:
    - title: Establecer headers comunes para todas las peticiones del escenario
      gherkin: |
        Dado que los siguientes headers se aplican a todas las peticiones posteriores:
          | X-Tenant-Id | acme |
          | X-Version   | 2    |
        Cuando hago una petición GET a "users"
        Entonces el código de estado HTTP es igual a 200
        Cuando hago una petición GET a "users/1"
        Entonces el código de estado HTTP es igual a 200


'rest.auth.bearer':
  expression: 'la autorización es Bearer {token:text}'
  example: |
    Dado que la autorización es Bearer "mitoken"
  scenarios:
    - title: Autenticarse con un token Bearer estático
      gherkin: |
        Dado que la autorización es Bearer "mitoken"
        Cuando hago una petición GET a "secure/resource"
        Entonces el código de estado HTTP es igual a 200
    - title: Autenticarse con un token almacenado en una variable
      gherkin: |
        Dado que la autorización es Bearer "${accessToken}"
        Cuando hago una petición GET a "secure/resource"
        Entonces el código de estado HTTP es igual a 200


'rest.auth.basic':
  expression: 'la autorización es Basic con usuario {username:text} y contraseña {password:text}'
  example: |
    Dado que la autorización es Basic con usuario "admin" y contraseña "secret"
  scenarios:
    - title: Autenticarse con credenciales Basic
      gherkin: |
        Dado que la autorización es Basic con usuario "admin" y contraseña "secret"
        Cuando hago una petición GET a "admin/settings"
        Entonces el código de estado HTTP es igual a 200


'rest.auth.apikey.header':
  expression: 'la API key {key:text} se envía en el header {name:text}'
  example: |
    Dado que la API key "abc123" se envía en el header "X-API-Key"
  scenarios:
    - title: Autenticarse con una API key en un header personalizado
      gherkin: |
        Dado que la API key "abc123" se envía en el header "X-API-Key"
        Cuando hago una petición GET a "data"
        Entonces el código de estado HTTP es igual a 200


'rest.auth.apikey.query':
  expression: 'la API key {key:text} se envía como parámetro de query {name:text}'
  example: |
    Dado que la API key "abc123" se envía como parámetro de query "api_key"
  scenarios:
    - title: Autenticarse con una API key como parámetro de query
      gherkin: |
        Dado que la API key "abc123" se envía como parámetro de query "api_key"
        Cuando hago una petición GET a "data"
        Entonces el código de estado HTTP es igual a 200


'rest.auth.oauth2.client_credentials':
  expression: 'obtengo un token OAuth2 de cliente de {url:text} con cliente {clientId:text} y secreto {clientSecret:text} en la variable {variable:id}'
  example: |
    Dado que obtengo un token OAuth2 de cliente de "https://auth.example.com/token" con cliente "my-client" y secreto "my-secret" en la variable accessToken
  scenarios:
    - title: Obtener un token OAuth2 y usarlo para acceder a un recurso protegido
      gherkin: |
        Dado que obtengo un token OAuth2 de cliente de "${auth.tokenUrl}" con cliente "${auth.clientId}" y secreto "${auth.clientSecret}" en la variable accessToken
        Y la autorización es Bearer "${accessToken}"
        Cuando hago una petición GET a "secure/resource"
        Entonces el código de estado HTTP es igual a 200


'rest.auth.oauth2.password':
  expression: 'obtengo un token OAuth2 de contraseña de {url:text} con cliente {clientId:text} y secreto {clientSecret:text} como usuario {username:text} con contraseña {password:text} en la variable {variable:id}'
  example: |
    Dado que obtengo un token OAuth2 de contraseña de "https://auth.example.com/token" con cliente "my-client" y secreto "my-secret" como usuario "admin" con contraseña "admin123" en la variable accessToken
  scenarios:
    - title: Obtener un token de usuario y usarlo para acceder a un recurso protegido por rol
      gherkin: |
        Dado que obtengo un token OAuth2 de contraseña de "${auth.tokenUrl}" con cliente "${auth.clientId}" y secreto "${auth.clientSecret}" como usuario "${test.username}" con contraseña "${test.password}" en la variable accessToken
        Y la autorización es Bearer "${accessToken}"
        Cuando hago una petición GET a "admin/settings"
        Entonces el código de estado HTTP es igual a 200


'rest.request.headers':
  expression: 'la próxima petición tiene los headers:'
  example: |
    Dado que la próxima petición tiene los headers:
      | Authorization | Bearer mitoken |
      | X-Tenant-Id   | acme           |
  scenarios:
    - title: Enviar un header de autorización con una petición GET
      gherkin: |
        Dado que la próxima petición tiene los headers:
          | Authorization | Bearer ${token} |
        Cuando hago una petición GET a "secure/resource"
        Entonces el código de estado HTTP es igual a 200


'rest.request.GET':
  expression: 'hago una petición GET a {endpoint:text}'
  example: |
    Cuando hago una petición GET a "users"
  scenarios:
    - title: Obtener una colección de recursos
      gherkin: |
        Cuando hago una petición GET a "users"
        Entonces el código de estado HTTP es igual a 200
        Y el cuerpo de la respuesta contiene:
        """json
        [{"id": 1, "name": "Alice"}]
        """
    - title: Obtener un recurso por ID
      gherkin: |
        Cuando hago una petición GET a "users/1"
        Entonces el código de estado HTTP es igual a 200


'rest.request.POST.empty':
  expression: 'hago una petición POST a {endpoint:text}'
  example: |
    Cuando hago una petición POST a "users"
  scenarios:
    - title: Disparar una acción sin cuerpo
      gherkin: |
        Cuando hago una petición POST a "sessions/logout"
        Entonces el código de estado HTTP es igual a 204


'rest.request.POST.body':
  expression: 'hago una petición POST a {endpoint:text} con el cuerpo:'
  example: |
    Cuando hago una petición POST a "users" con el cuerpo:
    """json
    {
      "name": "John",
      "age": 30
    }
    """
  scenarios:
    - title: Crear un recurso correctamente
      gherkin: |
        Cuando hago una petición POST a "users" con el cuerpo:
        """json
        {"name": "John", "age": 30}
        """
        Entonces el código de estado HTTP es igual a 201
    - title: Rechazar una petición con datos inválidos
      gherkin: |
        Cuando hago una petición POST a "users" con el cuerpo:
        """json
        {"name": ""}
        """
        Entonces el código de estado HTTP es igual a 400


'rest.request.POST.file':
  expression: 'hago una petición POST a {endpoint:text} con el cuerpo del archivo {file:text}'
  example: |
    Cuando hago una petición POST a "users" con el cuerpo del archivo "user_data.json"
  scenarios:
    - title: Crear un recurso usando un cuerpo desde archivo
      gherkin: |
        Cuando hago una petición POST a "users" con el cuerpo del archivo "fixtures/new_user.json"
        Entonces el código de estado HTTP es igual a 201


'rest.request.POST.urlencoded':
  expression: 'hago una petición POST a {endpoint:text} con formulario URL-encoded:'
  example: |
    Cuando hago una petición POST a "login" con formulario URL-encoded:
      | username | alice |
      | password | s3cr3t |
  scenarios:
    - title: Enviar un formulario de login
      gherkin: |
        Cuando hago una petición POST a "login" con formulario URL-encoded:
          | username | alice  |
          | password | s3cr3t |
        Entonces el código de estado HTTP es igual a 200


'rest.request.POST.multipart':
  expression: 'hago una petición POST a {endpoint:text} con formulario multipart:'
  example: |
    Cuando hago una petición POST a "upload" con formulario multipart:
      | name  | Alice |
      | email | alice@example.com |
  scenarios:
    - title: Enviar un formulario multipart
      gherkin: |
        Cuando hago una petición POST a "upload" con formulario multipart:
          | name  | Alice             |
          | email | alice@example.com |
        Entonces el código de estado HTTP es igual a 200


'rest.request.PUT.body':
  expression: 'hago una petición PUT a {endpoint:text} con el cuerpo:'
